<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin Nivel Banco - Solicitudes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0a0f1c;
color:#e5e7eb;
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:270px;
background:#0f172a;
padding:20px;
border-right:1px solid rgba(255,255,255,.06);
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
font-weight:800;
}

.menu a{
display:block;
padding:12px;
color:#94a3b8;
text-decoration:none;
border-radius:10px;
margin-bottom:8px;
transition:.2s;
}

.menu a:hover{
background:#1e293b;
color:white;
}

/* MAIN */
.main{
flex:1;
padding:22px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.title{
font-size:22px;
font-weight:900;
}

.search{
padding:10px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.08);
background:#0f172a;
color:white;
width:280px;
outline:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:14px;
}

.card{
background:#0f172a;
border:1px solid rgba(255,255,255,.06);
padding:18px;
border-radius:16px;
transition:.2s;
}

.card:hover{transform:translateY(-3px);}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:999px;
font-size:12px;
background:#1e293b;
color:#60a5fa;
margin-bottom:10px;
}

.card h3{font-size:16px;font-weight:800;}

.card p{font-size:13px;color:#94a3b8;margin:4px 0;}

.btn{
padding:8px 12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
background:#1f2937;
color:white;
margin-top:10px;
}

.btn:hover{background:#334155;}

/* LOGIN */
.login{
position:fixed;
inset:0;
background:#0a0f1c;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#0f172a;
padding:30px;
border-radius:16px;
width:340px;
border:1px solid rgba(255,255,255,.06);
}

.login-box input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,.08);
background:#0a0f1c;
color:white;
margin-bottom:10px;
}

.hidden{display:none;}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-box{
background:#0f172a;
width:90%;
max-width:700px;
max-height:90vh;
overflow:auto;
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,.1);
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>Acceso Administrativo</h2>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn" onclick="login()">Entrar</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="app">
  <h2>🏦 Panel Banco</h2>
  <div class="menu">
    <a href="#">Solicitudes</a>
  </div>
</div>

<!-- MAIN -->
<div class="main hidden" id="main">

  <div class="topbar">
    <div class="title">Solicitudes</div>
    <input class="search" placeholder="Buscar nombre..." oninput="filtrar(this.value)">
  </div>

  <div class="grid" id="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div id="modalContent"></div>
    <button class="btn" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://xilsdgjvqawroztfbwmu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhpbHNkZ2p2cWF3cm96dGZid211Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MzExNTgsImV4cCI6MjA5NTAwNzE1OH0.0NUvn6SeKdbr2RqS7s_8Qg7RVCDGMY4lP65JKbWf0WE"
);

let dataGlobal = [];

/* LOGIN */
async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("pass").value;

const { error } = await supabaseClient.auth.signInWithPassword({
email,
password
});

if(error){
alert(error.message);
return;
}

document.getElementById("login").style.display="none";
document.getElementById("app").classList.remove("hidden");
document.getElementById("main").classList.remove("hidden");

loadData();
}

/* DATA */
async function loadData(){

const { data, error } = await supabaseClient
  .from("solicitudes")
  .select("*")
  .order("id", { ascending: false });

if(error){
alert(error.message);
return;
}

dataGlobal = data;
render(data);
}

/* RENDER LISTA */
function render(data){

const grid = document.getElementById("grid");
grid.innerHTML="";

data.forEach(d => {

grid.innerHTML += `
<div class="card">
  <div class="badge">${d.tipo_ingreso || "-"}</div>
  <h3>${d.nombre}</h3>
  <p>${d.telefono}</p>

  <button class="btn" onclick='ver(${JSON.stringify(d)})'>
    Ver solicitud
  </button>
</div>
`;

});
}

/* FILTRO */
function filtrar(v){
render(dataGlobal.filter(x =>
x.nombre.toLowerCase().includes(v.toLowerCase())
));
}

function closeModal(){

</script>

</body>
</html>
